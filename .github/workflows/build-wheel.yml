name: build-wheel

on:
  push:
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build wheel
        run: python -m build --wheel

      - name: Install built wheel
        run: |
          python -m pip install dist/*.whl
          python - <<'PY'
          from watchdog_browser import TaskRepository, build_headers_for_task
          print(TaskRepository.__name__)
          print(callable(build_headers_for_task))
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v5
        with:
          name: watchdog-browser-wheel
          path: dist/*.whl
          retention-days: 3

      - name: 📦 Pack & Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          body: "Automated build. Updated: ${{ github.event.head_commit.timestamp }}"
          prerelease: true
          files: dist/*.whl
